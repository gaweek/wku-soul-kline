<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 图标部分 (左侧) -->
  <g transform="translate(10, 5) scale(0.12)">
      <!-- 复用 logo-icon 的核心图形 -->
      <line x1="60" y1="280" x2="60" y2="380" stroke="#94a3b8" stroke-width="24" stroke-linecap="round"/>
      <rect x="30" y="300" width="60" height="60" rx="8" fill="#cbd5e1"/>

      <line x1="180" y1="180" x2="180" y2="320" stroke="#6366f1" stroke-width="24" stroke-linecap="round"/>
      <rect x="150" y="220" width="60" height="80" rx="8" fill="#6366f1" />

      <line x1="300" y1="50" x2="300" y2="250" stroke="#10b981" stroke-width="24" stroke-linecap="round"/>
      <rect x="270" y="80" width="60" height="140" rx="8" fill="#34d399"/>
      
      <!-- S曲线 -->
      <path d="M80 360 C 140 360, 140 260, 200 260 C 260 260, 260 120, 340 120" 
        fill="none" stroke="#4f46e5" stroke-width="32" stroke-linecap="round" opacity="0.5" />
  </g>

  <!-- 文字部分: 人生K线 -->
  <!-- 这里的 Path 是基于思源宋体与几何体修改的矢量轮廓模拟 -->
  <g transform="translate(70, 42) scale(0.08, -0.08)" fill="url(#textGrad)">
    
    <!-- 人 -->
    <path d="M250 500 Q 300 550, 400 300 Q 500 50, 600 0 L 550 0 Q 450 50, 380 250 Q 250 100, 100 0 L 50 0 Q 200 150, 300 350 Q 280 400, 250 500 Z" />
    
    <!-- 生 -->
    <path d="M750 0 L 1150 0 L 1150 50 L 1000 50 L 1000 200 L 1100 200 L 1100 250 L 1000 250 L 1000 400 L 1150 400 L 1150 450 L 980 450 L 930 550 L 880 530 L 930 450 L 750 450 L 750 400 L 900 400 L 900 250 L 800 250 L 800 200 L 900 200 L 900 50 L 750 50 Z" />

    <!-- K -->
    <path d="M1300 0 L 1360 0 L 1360 220 L 1550 450 L 1630 450 L 1430 220 L 1650 0 L 1570 0 L 1360 180 L 1360 550 L 1300 550 Z" />

    <!-- 线 -->
    <path d="M1800 50 L 1750 100 L 1800 150 L 1750 200 L 1800 250 L 1750 300 L 1800 350 L 1750 400 L 1800 450 L 1850 450 L 1850 50 L Z M1900 0 L 2200 0 L 2200 50 L 1950 50 L 1950 200 L 2150 200 L 2150 250 L 1950 250 L 1950 300 L 2200 300 L 2200 350 L 1900 350 Z" />
    <!-- 修正 "线" 的右边部分，更像几何化的线条 -->
    <rect x="1950" y="400" width="250" height="50" rx="5" />
    <rect x="1950" y="100" width="250" height="50" rx="5" />
    <rect x="2050" y="0" width="50" height="550" rx="5" />
  </g>
  
  <!-- Slogan (Optional) -->
  <text x="72" y="54" font-family="sans-serif" font-size="8" fill="#64748b" letter-spacing="1">LIFE DESTINY K-LINE</text>
</svg>
