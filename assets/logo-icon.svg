<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- 背景圆（可选，图标用） -->
  <circle cx="256" cy="256" r="240" fill="#f8fafc" stroke="#e2e8f0" stroke-width="8"/>

  <!-- K线组 -->
  <g transform="translate(66, 66) scale(0.75)">
    <!-- 1. 过去 (阴线/低谷) -->
    <line x1="60" y1="280" x2="60" y2="380" stroke="#94a3b8" stroke-width="12" stroke-linecap="round"/>
    <rect x="30" y="300" width="60" height="60" rx="8" fill="#cbd5e1" stroke="#94a3b8" stroke-width="0"/>

    <!-- 2. 现在 (转折/酝酿) -->
    <line x1="180" y1="180" x2="180" y2="320" stroke="#6366f1" stroke-width="12" stroke-linecap="round"/>
    <rect x="150" y="220" width="60" height="80" rx="8" fill="url(#mainGrad)" />

    <!-- 3. 未来 (巅峰/阳线) -->
    <line x1="300" y1="50" x2="300" y2="250" stroke="#10b981" stroke-width="12" stroke-linecap="round"/>
    <rect x="270" y="80" width="60" height="140" rx="8" fill="#34d399" stroke="#059669" stroke-width="0"/>
    
    <!-- 巅峰星标 -->
    <path d="M300 20 L310 45 L335 45 L315 60 L322 85 L300 70 L278 85 L285 60 L265 45 L290 45 Z" fill="#fbbf24" stroke="#d97706" stroke-width="2" />
  </g>

  <!-- 命运曲线 (S形连接) -->
  <path d="M80 360 C 140 360, 140 260, 200 260 C 260 260, 260 120, 340 120" 
        fill="none" 
        stroke="#4f46e5" 
        stroke-width="16" 
        stroke-linecap="round" 
        stroke-dasharray="20 15"
        opacity="0.6" />
</svg>
